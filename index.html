<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lawhatul Mafatih - Digital Lauh</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            background-color: #1b4d3e;
            color: white;
            width: 100%;
            text-align: center;
            padding: 20px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .container {
            width: 90%;
            max-width: 400px;
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        .lauh-board {
            border: 2px dashed #1b4d3e;
            padding: 40px 20px;
            margin: 20px 0;
            border-radius: 10px;
            background-color: #fbfdfb;
            font-size: 24px;
            font-weight: bold;
            color: #1b4d3e;
        }
        button {
            background-color: #1b4d3e;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        button:hover {
            background-color: #14392e;
        }
    </style>
</head>
<body>

    <header>
        <h1>Lawhatul Mafatih</h1>
        <p>Digital Lauh Mobile</p>
    </header>

    <div class="container">
        <h3>Papan Hafalan Anda</h3>
        <div class="lauh-board" id="display-text">
            Selamat Datang di Digital Lauh
        </div>
        <button onclick="gantiTeks()">Mulai Belajar</button>
    </div>

    <script>
        function gantiTeks() {
            document.getElementById('display-text').innerText = "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ";
        }
    </script>

</body>
</html>
